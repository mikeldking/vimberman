<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VIMBERMAN — Vim motions. Bomb fuses. Keystroke economy.</title>
<meta name="description" content="A browser Bomberman-like where every move is a Vim command. Learn motions under bomb fuses, zombies, and keystroke budgets.">
<meta name="theme-color" content="#06170d">
<meta property="og:type" content="website">
<meta property="og:title" content="VIMBERMAN">
<meta property="og:description" content="Vim motions. Bomb fuses. Keystroke economy. A browser Bomberman-like where every move is a Vim command.">
<meta property="og:url" content="https://mikeldking.github.io/vimberman/">
<meta property="og:image" content="https://raw.githubusercontent.com/mikeldking/vimberman/main/assets/vimberman-banner.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="VIMBERMAN">
<meta name="twitter:description" content="Vim motions. Bomb fuses. Keystroke economy.">
<meta name="twitter:image" content="https://raw.githubusercontent.com/mikeldking/vimberman/main/assets/vimberman-banner.svg">
</head>
<body>
  <div id="crt">
    <div id="hud">
      <span id="hud-level">VIMBERMAN</span>
      <span id="hud-keys"></span>
      <span id="hud-right"></span>
    </div>
    <div id="vocab"></div>
    <div id="stage">
      <canvas id="game"></canvas>
      <div id="toast"></div>
      <div id="termbox" class="hidden"></div>
      <div id="overlay"><div class="panel" id="panel"></div></div>
    </div>
    <div id="statusline">
      <span class="mode" id="sl-mode">-- MENU --</span>
      <span class="mid"><span id="sl-echo"></span></span>
      <span class="last" id="sl-last"></span>
      <span class="pend" id="sl-pend"></span>
      <span class="pos" id="sl-pos"></span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
